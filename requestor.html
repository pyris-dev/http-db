<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini API Requester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .form-container {
            padding: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
        }

        .method-url-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 15px;
            align-items: end;
        }

        .button-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 500;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .response-section {
            margin-top: 40px;
        }

        .response-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .response {
            background: #f8f9fa;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            padding: 20px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-x: auto;
            min-height: 150px;
            color: #333;
        }

        .loading {
            color: #667eea;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .method-url-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .button-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .container {
                margin: 10px;
                border-radius: 10px;
            }

            .form-container {
                padding: 25px;
            }

            .header {
                padding: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }
        }

        /* Custom scrollbar */
        .response::-webkit-scrollbar {
            width: 8px;
        }

        .response::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .response::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .response::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>API Requester</h1>
            <p>Test and debug your API endpoints with ease</p>
        </div>

        <div class="form-container">
            <div class="form-grid">
                <div class="form-group full-width">
                    <div class="method-url-row">
                        <div>
                            <label for="method">Method</label>
                            <select id="method">
                                <option>GET</option>
                                <option>POST</option>
                                <option>PUT</option>
                                <option>DELETE</option>
                                <option>PATCH</option>
                            </select>
                        </div>
                        <div>
                            <label for="url">Request URL</label>
                            <input type="text" id="url" placeholder="https://api.example.com/resource" />
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="headers">Headers (JSON format)</label>
                    <textarea id="headers" placeholder='{"Content-Type": "application/json"}'></textarea>
                </div>

                <div class="form-group">
                    <label for="params">Query Params (JSON format)</label>
                    <textarea id="params" placeholder='{"key": "value"}'></textarea>
                </div>

                <div class="form-group full-width">
                    <label for="body">Request Body (JSON format)</label>
                    <textarea id="body" placeholder='{"name": "John"}'></textarea>
                </div>
            </div>

            <div class="button-row">
                <button id="sendBtn">Send Request</button>
                <div class="checkbox-group">
                    <input type="checkbox" id="showHeaders" checked>
                    <label for="showHeaders">Show response headers</label>
                </div>
            </div>

            <div class="response-section">
                <h2>Response</h2>
                <div class="response" id="response">Response will appear here...</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const method = document.getElementById('method').value;
            const urlInput = document.getElementById('url').value.trim();
            const headersInput = document.getElementById('headers').value.trim();
            const paramsInput = document.getElementById('params').value.trim();
            const bodyInput = document.getElementById('body').value.trim();
            const responseBox = document.getElementById('response');
            const sendBtn = document.getElementById('sendBtn');
            const showHeaders = document.getElementById('showHeaders').checked;

            let headers = {};
            let params = {};
            let body = null;

            try { if (headersInput) headers = JSON.parse(headersInput); } catch { return alert("Invalid headers JSON"); }
            try { if (paramsInput) params = JSON.parse(paramsInput); } catch { return alert("Invalid params JSON"); }
            try { if (bodyInput) body = JSON.parse(bodyInput); } catch { return alert("Invalid body JSON"); }

            // Build URL (handle relative URLs)
            let finalUrl;
            try {
                finalUrl = new URL(urlInput);
            } catch {
                try {
                    finalUrl = new URL(urlInput, window.location.href);
                } catch (err) {
                    return alert('Invalid URL');
                }
            }

            const query = new URLSearchParams();
            for (const [k, v] of Object.entries(params)) {
                // simple flat support only
                query.append(k, String(v));
            }
            if (query.toString()) {
                finalUrl.search += (finalUrl.search ? '&' : '') + query.toString();
            }

            responseBox.textContent = "Sending request...";
            responseBox.className = "response loading";
            sendBtn.disabled = true;

            try {
                const payload = (body === null || body === undefined) ? undefined : JSON.stringify(body);
                // set default content-type if sending body and no header set
                if (payload && !Object.keys(headers).some(k => k.toLowerCase() === 'content-type')) {
                    headers['Content-Type'] = 'application/json';
                }

                const res = await fetch(finalUrl.toString(), {
                    method,
                    headers,
                    ...(payload !== undefined && !['GET', 'HEAD'].includes(method) ? { body: payload } : {}),
                });

                const ct = res.headers.get('content-type') || '';
                let output;
                if (ct.includes('application/json')) {
                    const json = await res.json();
                    output = JSON.stringify(json, null, 2);
                } else {
                    output = await res.text();
                }

                let responseText = `Status: ${res.status} ${res.statusText}`;

                if (showHeaders) {
                    const respHeaders = {};
                    for (const [k, v] of res.headers.entries()) respHeaders[k] = v;
                    responseText += `\n\nHeaders:\n${JSON.stringify(respHeaders, null, 2)}`;
                }

                responseText += `\n\nBody:\n${output}`;
                responseBox.textContent = responseText;
            } catch (err) {
                responseBox.textContent = "Error: " + (err.message || String(err));
            } finally {
                responseBox.className = "response";
                sendBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
